version: 2

project_name: blogwatcher

builds:
  - id: blogwatcher
    main: ./cmd/blogwatcher
    binary: blogwatcher
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w -X github.com/rdslw/blogwatcher/internal/version.Version={{.Version}}

archives:
  - id: blogwatcher
    builds:
      - blogwatcher
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
